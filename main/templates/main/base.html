<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Хранитель Семени{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Fira Code', monospace;
            background: #0a0f0a;
            background-image: 
                repeating-linear-gradient(45deg, rgba(90, 143, 60, 0.05) 0px, rgba(90, 143, 60, 0.05) 2px,
                                          transparent 2px, transparent 8px),
                radial-gradient(circle at 20% 30%, rgba(90, 143, 60, 0.1) 0%, transparent 50%);
            color: #c0ffc0;
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
        }

        /* Шапка */
        nav {
            background: #0f1a0f;
            padding: 15px 20px;
            border-bottom: 3px solid #5a8f3c;
            margin-bottom: 30px;
            box-shadow: 0 0 8px #5a8f3c;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        nav a {
            color: #b3ffb3;
            text-decoration: none;
            font-size: 1.2rem;
            padding: 6px 12px;
            border: 1px solid #5a8f3c;
            transition: all 0.2s;
            background: #0f1a0f;
        }

        nav a:hover {
            background: #5a8f3c;
            color: #0a0f0a;
            transform: scale(1.02);
        }

        /* Заголовки */
        h1 {
            font-size: 2.2rem;
            text-align: center;
            margin: 20px 0;
            letter-spacing: 2px;
            border-left: 4px solid #5a8f3c;
            border-right: 4px solid #5a8f3c;
            display: inline-block;
            padding: 0 20px;
        }

        h2, h3 {
            color: #d0ffa0;
            margin: 15px 0 10px;
        }

        /* Карточки */
        .card, .ability-card, .mission-card {
            background: #111a11;
            border: 2px solid #5a8f3c;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            transition: all 0.2s;
            box-shadow: 5px 5px 0 #2a3a2a;
        }

        .card:hover, .ability-card:hover, .mission-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 #5a8f3c;
        }

        /* Кнопки */
        .btn, button {
            background: #1e2a1e;
            color: #c0ffc0;
            border: 1px solid #6b8c42;
            padding: 8px 20px;
            font-size: 1rem;
            font-family: monospace;
            cursor: pointer;
            transition: 0.1s linear;
            margin-top: 10px;
        }

        .btn:hover, button:hover {
            background: #5a8f3c;
            color: #0a0f0a;
            border-color: #c0ffc0;
        }

        /* Блоки кода */
        .code-block {
            background: #0a0f0a;
            padding: 15px;
            border-left: 6px solid #5a8f3c;
            font-family: monospace;
            margin: 15px 0;
            overflow-x: auto;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Сообщения */
        .result-message {
            margin-top: 10px;
            padding: 8px;
            background: #1e2a1e;
            border-left: 4px solid #5a8f3c;
            font-size: 0.9rem;
        }

        /* Футер */
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            border-top: 2px solid #5a8f3c;
            font-size: 0.8rem;
        }

        /* Сила семени */
        .seed-bar {
            width: 100%;
            background: #1e2a1e;
            height: 20px;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        .seed-fill {
            background: #5a8f3c;
            height: 100%;
            width: 0%;
            transition: width 0.2s;
        }

        /* Форма контактов */
        .contact-form {
            background: #0a0f0a;
            border: 3px solid #6b8c42;
            border-radius: 24px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 10px 10px 0 #2a3a2a;
            transition: all 0.1s linear;
        }

        .contact-form:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0 #5a8f3c;
        }

        .contact-form .form-group {
            margin-bottom: 25px;
        }

        .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b3ffb3;
            border-left: 4px solid #6b8c42;
            padding-left: 12px;
        }

        .contact-form input,
        .contact-form textarea {
            width: 100%;
            padding: 14px;
            background: #111a11;
            border: 2px solid #3a5a2a;
            border-radius: 16px;
            color: #c0ffc0;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .contact-form input:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: #8bc34a;
            background: #1e2a1e;
            box-shadow: 0 0 0 3px rgba(107, 140, 66, 0.3);
        }

        .contact-form button {
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #1e2a1e;
            border: 2px solid #6b8c42;
            color: #c0ffc0;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s linear;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .contact-form button:hover {
            background: #6b8c42;
            color: #0a0f0a;
            border-color: #c0ffc0;
            transform: scale(1.02);
        }

        /* Карточки контактов */
        .contact-info {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 40px 0;
        }

        .info-card {
            background: #111a11;
            border: 2px solid #6b8c42;
            border-radius: 24px;
            padding: 20px 30px;
            min-width: 180px;
            text-align: center;
            transition: all 0.1s linear;
            box-shadow: 5px 5px 0 #2a3a2a;
        }

        .info-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 #5a8f3c;
            background: #1e2a1e;
        }

        .info-card h3 {
            margin-bottom: 12px;
            font-size: 1.4rem;
            border-bottom: 2px dashed #6b8c42;
            display: inline-block;
        }

        .info-card p {
            font-size: 1rem;
            margin-top: 12px;
            color: #c0ffc0;
        }

        /* Анимация */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 10px #5a8f3c; }
            100% { transform: scale(1); }
        }

        .stat-value.pulse {
            animation: pulse 0.3s ease;
        }

        /* ===== АДАПТАЦИЯ ПОД ТЕЛЕФОНЫ ===== */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            nav {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 10px;
            }
            
            nav a {
                font-size: 0.9rem;
                padding: 6px 12px;
                width: 100%;
                text-align: center;
            }
            
            h1 {
                font-size: 1.8rem !important;
            }
            
            h2 {
                font-size: 1.4rem !important;
            }
            
            .stats {
                flex-direction: column;
                align-items: center;
            }
            
            .stat-card {
                width: 90%;
                max-width: 280px;
            }
            
            .quick-links {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            
            .link-btn {
                width: 80%;
                text-align: center;
            }
            
            .abilities-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .ability-card {
                padding: 20px;
            }
            
            .code-block pre {
                font-size: 0.8rem;
            }
            
            .mission-card {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .mission-icon {
                font-size: 2rem;
            }
            
            .contact-info {
                flex-direction: column;
                align-items: center;
            }
            
            .info-card {
                width: 90%;
                max-width: 280px;
            }
            
            .contact-form {
                padding: 20px;
            }
            
            .pagination {
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }
            
            .page-link, .page-current {
                padding: 6px 12px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem !important;
            }
            
            .ability-btn {
                font-size: 0.9rem;
                padding: 8px 16px;
            }
            
            .result-message {
                font-size: 0.8rem;
            }
            
            footer {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">🌱 Главная</a>
        <a href="/abilities/">✨ Способности</a>
        <a href="/missions/">⚔️ Лог битв</a>
        <a href="/contact/">📞 Контакты</a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-quote">
            {% block footer_quote %}
             "Чистый код — это не роскошь, а необходимость"
            {% endblock %}
        </div>
        <p>© Весь код js был написан с помошью ИИ. 2026 Хранитель Семени | Сделано с душой </p>
    </footer>
</body>
</html>
